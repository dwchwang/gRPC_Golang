syntax = "proto3";

// package này dùng trong Go import path
package user;
option go_package = "grpc-demo/pb";

// ── Message definitions ──────────────────────────────

message CreateUserRequest {
  string name  = 1;
  string email = 2;
  int32  age   = 3;
}

message CreateUserResponse {
  string id    = 1;
  string name  = 2;
  string email = 3;
}

message GetUserRequest {
  string id = 1;
}

message UserListRequest {
  int32 limit =1;
}

// Message cho upload file, có thể dùng trong tương lai nếu muốn mở rộng tính năng upload file
message FileChunk {
  string filename = 1;
  bytes  data     = 2;  // binary data của chunk
  int32  seq      = 3;  // thứ tự chunk
}

message UploadResponse {
  string file_id = 1;
  int32 total_bytes = 2;
  string message = 3;
}

// Message cho chat
message ChatMessage {
  string user    = 1;
  string text    = 2;
  int64  sent_at = 3; // unix timestamp
}



// ── Service definition ───────────────────────────────

service UserService {
  // Unary: tạo user
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);

  // Unary: lấy user theo id
  rpc GetUser (GetUserRequest) returns (CreateUserResponse);

  // server streaming: Tra ve danh sach tung cai mot
  rpc ListUsers (UserListRequest) returns (stream CreateUserResponse);

  // client streaming: upload file theo tung   chunk
  rpc UploadFile (stream FileChunk) returns (UploadResponse);

  // Bidirectional Streaming: chat realtime
  rpc Chat (stream ChatMessage)       returns (stream ChatMessage);
}